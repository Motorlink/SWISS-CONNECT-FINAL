version: '3.9'
services:
  backend:
    build: ./services/backend
    container_name: swiss-connect-backend
    env_file:
      - .env
    ports:
      - '8000:8000'
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./services/backend:/app
    depends_on:
      - redis
  frontend:
    build: ./services/frontend
    container_name: swiss-connect-frontend
    ports:
      - '3000:3000'
    command: npm run dev
    volumes:
      - ./services/frontend:/app
  demo:
    image: node:22
    container_name: swiss-connect-demo
    working_dir: /app
    ports:
      - '3001:3001'
    command: sh -c 'npm install && npm run dev -- --host 0.0.0.0 --port 3001'
    volumes:
      - ./services/demo:/app
  landing:
    image: node:22
    container_name: swiss-connect-landing
    working_dir: /app
    ports:
      - '3002:3002'
    command: sh -c 'npm install && npm run dev -- --host 0.0.0.0 --port 3002'
    volumes:
      - ./services/landing:/app
  redis:
    image: redis:7-alpine
    container_name: swiss-connect-redis
    ports:
      - '6379:6379'
